name: daily-update

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Debug HTML response
        run: |
          echo "=== curl test ==="
          curl -s -o /tmp/fs_test.html -w "status=%{http_code} size=%{size_download}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml" \
            -H "Accept-Language: ja,en-US;q=0.7" \
            "https://freelance-start.com/agents/42/job?page=1"
          echo ""
          echo "=== count pattern check ==="
          grep -o '.[0-9,]\{4,\}件[の中）].' /tmp/fs_test.html | head -5 || echo "NO MATCH"
          echo "=== html preview ==="
          head -c 500 /tmp/fs_test.html

      - name: Scrape data
        run: python scripts/scrape.py

      - name: Generate HTML
        run: python scripts/generate_html.py

      - name: Commit and push if changed
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add data/data.json index.html
          git diff --staged --quiet || git commit -m "update: $(date +%Y-%m-%d)"
          git pull --rebase && git push

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx --yes netlify-cli deploy --prod --dir=. --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/notify_slack.py
