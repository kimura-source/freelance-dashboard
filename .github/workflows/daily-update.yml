name: daily-update

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python scripts/scrape.py
      - run: python scripts/generate_html.py
      - run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add data/data.json index.html
          git diff --staged --quiet || git commit -m "update"
          git pull --rebase && git push
      - env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          echo "Token: ${NETLIFY_AUTH_TOKEN:0:4}..." && netlify deploy --prod --dir=. --site=$NETLIFY_SITE_ID --auth=nfp_s9oXizctSCRUcoqzJtHGFJVhzomqKTdz4d22
      - env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/notify_slack.py
